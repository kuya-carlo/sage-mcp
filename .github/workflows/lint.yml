name: Code Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Run Ruff check
        run: uv run ruff check .
      - name: Run Ruff format check
        run: uv run ruff format . --check
