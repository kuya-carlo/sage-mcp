<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="static/favicon.ico" type="image/x-icon">
    <title>SAGE - Student Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="glass-container" id="app">
        <!-- Loader -->
        <div id="loader" class="view active">
            <div class="spinner"></div>
            <p>Evaluating authentication state...</p>
        </div>

        <!-- Login View -->
        <div id="login-view" class="view hidden">
            <div class="hero">
                <img src="/static/logo.png" alt="SAGE Logo" class="main-logo">
                <h1>Welcome to <span class="gradient-text">SAGE</span></h1>
                <p class="centered-text">Your academic co-pilot connected directly to your Notion workspace.</p>
            </div>

            <button id="login-btn" class="glow-btn">
                Connect Notion
            </button>
        </div>

        <!-- Chat View -->
        <div id="chat-view" class="view hidden">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img src="/static/logo.png" alt="SAGE" style="width: 32px; height: 32px; border-radius: 8px;">
                    <h2><span class="gradient-text">SAGE</span></h2>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div id="burnout-container" class="burnout-meter hidden">
                        <div class="meter-label">COGNITIVE LOAD</div>
                        <div class="meter-bar">
                            <div id="load-fill" class="meter-fill" style="width: 0%"></div>
                        </div>
                        <span id="load-text">--%</span>
                    </div>
                    <button id="theme-toggle"
                        style="background:none; border:none; cursor:pointer; color:var(--text-secondary); font-size:1.2rem;">🌓</button>
                    <div class="status-badge"><span class="pulse"></span> Connected</div>
                    <a href="/auth/logout"
                        style="color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; border: 1px solid var(--border-glass); padding: 4px 10px; border-radius: 12px; transition: all 0.3s ease;">Disconnect</a>
                </div>
            </div>

            <div class="chat-window" id="chat-messages">
                <div class="message assistant">
                    <div class="msg-content">Hello! I am SAGE. Your Notion workspace is linked and armed. What are we building today?</div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="chat-input" placeholder="Ask SAGE to build a semester tree, evaluate cognitive load,..."
                    rows="1"></textarea>
                <button id="send-btn" class="send-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
                <button id="stop-btn" class="send-btn hidden"
                    style="background: var(--bg-glass); border: 1px solid var(--text-secondary); color: var(--text-primary);">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const views = {
                loader: document.getElementById('loader'),
                login: document.getElementById('login-view'),
                chat: document.getElementById('chat-view')
            };

            let pollInterval = null;

            const pollAuthStatus = (sessionId) => {
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(async () => {
                    try {
                        const res = await fetch(`/auth/notion/status?session_id=${sessionId}`);
                        const data = await res.json();
                        if (data.authenticated) {
                            clearInterval(pollInterval);
                            window.location.reload();
                        }
                    } catch (err) {
                        console.error("Polling failed:", err);
                    }
                }, 2000);
            };

            // Login action
            document.getElementById('login-btn').addEventListener('click', () => {
                let sessionId = localStorage.getItem('session_id');
                if (!sessionId) {
                    sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('session_id', sessionId);
                }
                window.open(`/auth/notion?session_id=${sessionId}`, '_blank');
                pollAuthStatus(sessionId);
            });

            // Burnout Meter logic
            const updateLoadStatus = async () => {
                const sessionId = localStorage.getItem('session_id');
                if (!sessionId) return;
                try {
                    const res = await fetch('/mcp/load-status', {
                        headers: { 'X-Session-ID': sessionId }
                    });
                    if (!res.ok) return;
                    const data = await res.json();

                    const container = document.getElementById('burnout-container');
                    const fill = document.getElementById('load-fill');
                    const text = document.getElementById('load-text');

                    container.classList.remove('hidden');
                    const score = data.load_score || 0;
                    fill.style.width = `${Math.min(score, 100)}%`;
                    text.textContent = `${Math.round(score)}%`;

                    fill.classList.remove('warning', 'danger');
                    if (score > 85) fill.classList.add('danger');
                    else if (score > 60) fill.classList.add('warning');
                } catch (err) {
                    console.error("Failed to update load status:", err);
                }
            };

            const switchView = (viewName) => {
                Object.values(views).forEach(v => {
                    v.classList.remove('active');
                    v.classList.add('hidden');
                });
                views[viewName].classList.remove('hidden');
                if (viewName === 'chat') {
                    updateLoadStatus();
                }
                setTimeout(() => views[viewName].classList.add('active'), 50);
            };

            // Poll load status periodically when in chat view
            setInterval(() => {
                if (views.chat.classList.contains('active')) updateLoadStatus();
            }, 300000);

            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('click', () => {
                const root = document.documentElement;
                if (root.getAttribute('data-theme') === 'light') {
                    root.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'dark');
                } else {
                    root.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                }
            });

            // Disconnect / Logout handler
            const logoutLink = document.querySelector('a[href="/auth/logout"]');
            if (logoutLink) {
                logoutLink.href = "/auth/notion/logout"; // Update to new endpoint
                logoutLink.addEventListener('click', () => {
                    localStorage.removeItem('session_id');
                });
            }
            // Init theme
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }

            // Check Auth Status
            const sessionId = localStorage.getItem('session_id');
            const loginBtn = document.getElementById('login-btn');
            if (sessionId) {
                fetch(`/auth/notion/status?session_id=${sessionId}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.authenticated) {
                            loginBtn.textContent = "Notion connected ✓";
                            loginBtn.style.background = "var(--success-glass)";
                            loginBtn.style.cursor = "default";
                            loginBtn.disabled = true;
                            loginBtn.onclick = (e) => e.preventDefault();
                            switchView('chat');
                        } else {
                            switchView('login');
                        }
                    })
                    .catch(err => {
                        console.error("Auth check failed:", err);
                        switchView('login');
                    });
            } else {
                switchView('login');
            }

            // Chat logic
            const sendBtn = document.getElementById('send-btn');
            const chatInput = document.getElementById('chat-input');
            const messagesWindow = document.getElementById('chat-messages');

            const appendMessage = (text, role, auditLog = null) => {
                const el = document.createElement('div');
                el.className = `message ${role}`;
                const inner = document.createElement('div');
                inner.className = 'msg-content';
                if (role === 'assistant') {
                    let html = marked.parse(text);
                    if (auditLog && auditLog.length > 0) {
                        html += `
                            <details class="audit-log">
                                <summary>🛠️ System Audit Log (${auditLog.length} operations)</summary>
                                <div class="audit-entries">
                                    ${auditLog.map(log => `<div>${log}</div>`).join('')}
                                </div>
                            </details>
                        `;
                    }
                    inner.innerHTML = html;
                } else {
                    inner.textContent = text;
                }
                el.appendChild(inner);
                messagesWindow.appendChild(el);
                messagesWindow.scrollTop = messagesWindow.scrollHeight;
            };

            let currentController = null;

            document.getElementById('stop-btn').addEventListener('click', () => {
                if (currentController) {
                    currentController.abort();
                }
            });

            const sendMessage = async () => {
                const text = chatInput.value.trim();
                if (!text) return;

                appendMessage(text, 'user');
                chatInput.value = '';

                // Show thinking state
                const thinkingId = "msg-" + Date.now();
                const thinkingEl = document.createElement('div');
                thinkingEl.className = 'message assistant thinking';
                thinkingEl.id = thinkingId;
                thinkingEl.innerHTML = '<div class="msg-content"><div class="dot-typing"></div></div>';
                messagesWindow.appendChild(thinkingEl);
                messagesWindow.scrollTop = messagesWindow.scrollHeight;

                currentController = new AbortController();

                // Show stop button & hide send button
                sendBtn.classList.add('hidden');
                document.getElementById('stop-btn').classList.remove('hidden');

                try {
                    const sessionId = localStorage.getItem('session_id');
                    const res = await fetch('/mcp/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Session-ID': sessionId
                        },
                        body: JSON.stringify({ message: text }),
                        signal: currentController.signal
                    });

                    if (res.status === 401) {
                        window.location.href = '/auth/logout';
                        return;
                    }

                    if (!res.ok) {
                        let errorDetail = "Unknown server error";
                        let errorLog = null;
                        try {
                            const errorData = await res.json();
                            errorDetail = errorData.detail || JSON.stringify(errorData);
                            errorLog = errorData.audit_log;
                        } catch (e) {
                            errorDetail = await res.text();
                        }
                        throw { message: `Server returned ${res.status}: ${errorDetail}`, auditLog: errorLog };
                    }

                    const data = await res.json();

                    // remove thinking
                    const thinkNode = document.getElementById(thinkingId);
                    if (thinkNode) thinkNode.remove();

                    if (data.error) {
                        appendMessage(`### ❌ Request Failed\n\nI encountered an error while processing your request:\n\n> ${data.error}`, 'assistant', data.audit_log);
                    } else {
                        appendMessage(data.response || JSON.stringify(data), 'assistant', data.audit_log);
                    }
                } catch (err) {
                    const thinkNode = document.getElementById(thinkingId);
                    if (thinkNode) thinkNode.remove();

                    if (err.name === 'AbortError') {
                        appendMessage(`⛔ **Generation immediately halted.**`, 'assistant');
                    } else {
                        const friendlyMsg = `### ⚠️ SAGE Connection Error\n\nSomething went wrong while communicating with my brain. This usually happens if the server is restarting or the connection was interrupted.\n\n**Technical Logs for Nerd Eyes:**\n\`\`\`\n${err.message || err}\n\`\`\``;
                        appendMessage(friendlyMsg, 'assistant', err.auditLog);
                    }
                } finally {
                    sendBtn.classList.remove('hidden');
                    document.getElementById('stop-btn').classList.add('hidden');
                    currentController = null;
                }
            };

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!document.getElementById('send-btn').classList.contains('hidden')) {
                        sendMessage();
                    }
                }
            });
        });
    </script>
</body>

</html>
